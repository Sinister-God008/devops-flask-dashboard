version: "3.9"

services:
  web:
    build: .
    container_name: flask-dashboard
    ports:
      - "5000:5000"
    environment:
      - ENVIRONMENT=DEV
      - APP_VERSION=1.0.0
      - REGION=us-east-1
      - DEBUG=False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
