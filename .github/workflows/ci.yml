name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-scan:
    name: Build, Scan & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t flask-dashboard:latest .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flask-dashboard:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag flask-dashboard:latest ${{ secrets.DOCKER_USERNAME }}/flask-dashboard:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-dashboard:latest

      - name: Deployment success notification
        if: success()
        run: echo "Build, scan, and push completed successfully."
      - name: Trigger Render deployment
        if: github.ref == 'refs/heads/main'
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
